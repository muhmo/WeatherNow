<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Now Dashboard</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="searchBar">
		<input type="text" name="searchInput" id="searchInput" placeholder="Enter city name">
		<button id="searchBtn">Search</button>
	</div>

	<div id="currentWeather" class="card">
		<p id="cityName" class="skeleton">City Name</p>
		<p id="temperature" class="skeleton">Temperaure</p>
		<p id="description" class="skeleton">Weather Description</p>
		<p id="humidity" class="skeleton">Humidity</p>
		<p id="windSpeed" class="skeleton">Wind Speed</p>
		<p id="time" class="skeleton">Time</p>
	</div>

	<div id="forecast">
		<div class="forecast-card">
			<h3 class="skeleton">Day</h3>
			<p class="skeleton">☀️</p>
			<p class="skeleton">--°C</p>
		</div>
