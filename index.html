<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Now Dashboard</title>
	<link rel="stylesheet" href="style.css">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
	<div id="searchBar">
		<input type="text" name="searchInput" id="searchInput" placeholder="Enter city name">
		<button id="searchBtn">Search</button>
	</div>

	<div id="currentWeather" class="card">
		<p id="cityName" class="skeleton">City Name</p>
		<p id="temperature" class="skeleton">Temperature</p>
		<p id="description" class="skeleton">Weather Description</p>
		<p id="humidity" class="skeleton">Humidity</p>
		<p id="windSpeed" class="skeleton">Wind Speed</p>
		<p id="time" class="skeleton">Time</p>
	</div>

	<div id="forecast"></div>

	<script>
		const searchBtn = document.getElementById("searchBtn");
		const searchInput = document.getElementById("searchInput");
		let debounceTimer;
		const DEBOUNCE_DELAY = 500;

		function lookupWeather(code) {
			const table = {
				0: "Clear ☀️",
				1: "Mainly Clear 🌤️",
      			2: "Partly Cloudy ⛅",
      			3: "Overcast ☁️",
      			45: "Fog 🌫️",
      			61: "Rain 🌧️",
      			71: "Snow ❄️",

			};
			return table[code] || "Unknown";
		}

		searchInput.addEventListener("input", () => {
      		clearTimeout(debounceTimer);
      		debounceTimer = setTimeout(() => {
        		const city = searchInput.value.trim();
        		if (city.length >= 2) {
          			fetchWeather(city);
        		} else {
          			document.getElementById("cityName").textContent = "⚠️ Enter at least 2 characters.";
        		}
      		}, DEBOUNCE_DELAY);
    	});

		searchBtn.addEventListener("click", () => {
			const city = searchInput.value.trim();
			if (city.length < 2) {
				document.getElementById("cityName").textContent = "⚠️ Enter at least 2 characters.";
				return;
			}
			fetchWeather(city);
		});

		async function fetchWeather(city) {
			try {
				const controller = new AbortController();
				const timeoutId = setTimeout(() => controller.abort(), 10000);

				const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`, {signal: controller.signal});
				clearTimeout(timeoutId);

				if(!geoRes.ok) throw new Error(`HTTP Error: ${geoRes.status}`);
				const geoData = await geoRes.json();

				if (!geoData.results || geoData.results.length === 0) {
					document.getElementById("cityName").textContent = "City not found!";
					return;
				}

				const { latitude, longitude, name, country } = geoData.results[0];

				const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`, 
					{ signal: controller.signal });

				if (!weatherRes.ok) throw new Error(`HTTP Error: ${weatherRes.status}`);

				const weatherData = await weatherRes.json();

				document.getElementById("cityName").textContent = `${name}, ${country}`;
      			document.getElementById("temperature").textContent = `Temp: ${weatherData.current_weather.temperature}°C`;
      			document.getElementById("description").textContent = `Weather: ${lookupWeather(weatherData.current_weather.weathercode)}`;
      			document.getElementById("humidity").textContent = `Humidity: (data not available in daily API)`;
      			document.getElementById("windSpeed").textContent = `Wind: ${weatherData.current_weather.windspeed} km/h`;

      			const forecastDiv = document.getElementById("forecast");
      			forecastDiv.innerHTML = "";
      			weatherData.daily.time.forEach((day, i) => {
      				const card = document.createElement("div");
      				card.className = "forecast-card";
      				card.innerHTML = `
          				<h4>${new Date(day).toLocaleDateString("en-US", { weekday: "short" })}</h4>
          				<p>${lookupWeather(weatherData.daily.weathercode[i])}</p>
          				<p>${weatherData.daily.temperature_2m_min[i]}°C / ${weatherData.daily.temperature_2m_max[i]}°C</p>
        			`;
        			forecastDiv.appendChild(card);
      			});

      			$.getJSON(`https://worldtimeapi.org/api/timezone/${weatherData.timezone}`)
      			.done(function(timeData) {
      				const localTime = new Date(timeData.datetime).toLocaleTimeString('en-US', {
      					hour: '2-digit',
      					minute: '2-digit',
      					second: '2-digit'
      				});
      				document.getElementById("time").textContent = `Local Time: ${localTime}`;
      			})
      			.fail(function() {
      				const now = new Date();
      				const fallbackTime = now.toLocaleTimeString('en-US', {
      					hour: '2-digit',
      					minute: '2-digit',
      					second: '2-digit'
      				});
      				document.getElementById("time").textContent = `Local Time (Browser): ${fallbackTime}`;
      			})
      			.always(function() {
      				console.log("WorldTimeAPI request finished.");
      			});

			} catch (err) {
				console.error(err);
				if (err.name === "AbortError") {
					document.getElementById("cityName").textContent = "Request timed out (10s).";
				} else {
					document.getElementById("cityName").textContent = `Error: ${err.message}`;
				}
			}
		}
	</script>
</body>
</html>
